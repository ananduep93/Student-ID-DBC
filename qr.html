<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generate Student ID Card - Don Bosco College</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/css/style.css">
  <link rel="stylesheet" href="./assets/css/qr.css">
  <!-- QR Code Styling Library -->
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>
  <!-- HTML to Canvas Library for Image Export -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body class="qr-page-theme">

  <div class="qr-container">
    
    <!-- Dynamic Content Area -->
    <main class="qr-wrapper">
      
      <!-- 1. LOADING STATE -->
      <div id="loading-view" class="qr-placeholder-state">
        <div class="loader-dots">
          <span></span>
          <span></span>
          <span></span>
        </div>
        <p class="loading-text">Generating student ID card...</p>
      </div>

      <!-- 2. ERROR STATE -->
      <div id="error-view" class="qr-error-card" style="display: none;">
        <div style="font-size: 3rem; color: var(--accent-primary);">⚠️</div>
        <h1>Profile Not Found</h1>
        <p>The student ID requested does not exist or has been removed.</p>
        <a href="./admin.html" class="btn btn-secondary" style="width: 100%; margin-top: 1rem;">Return to Admin Panel</a>
      </div>

      <!-- 3. DUAL-SIDED ID CARD DISPLAY -->
      <div id="qr-view" class="id-cards-wrapper" style="display: none;">
        
        <!-- FRONT SIDE OF ID CARD -->
        <article class="id-card id-card-front" id="front-card">
          <!-- Background SVG Layer -->
          <div class="card-bg-layer" id="front-bg-layer"></div>
          
          <div class="card-content">
            <div class="front-header">
              <div class="college-title">
                <h2>DON BOSCO COLLEGE</h2>
                <p>MAMPETTA, MUKKAM</p>
              </div>
            </div>
            
            <div class="photo-container-wrapper">
              <div class="photo-container-box">
                <img id="front-student-photo" src="" alt="Student Photo" style="display: none;">
                <div id="front-avatar-placeholder" class="avatar-placeholder">S</div>
              </div>
            </div>
            
            <div class="student-details-front">
              <h1 id="front-student-name">Student Name</h1>
              <p id="front-student-dept">Department Name</p>
              <p class="batch-text" id="front-student-batch">BATCH: 2025-2028</p>
            </div>
            
            <div class="front-footer">
              <p>DON BOSCO COLLEGE MAMPETTA,MUKKAM</p>
            </div>
          </div>
        </article>

        <!-- BACK SIDE OF ID CARD -->
        <article class="id-card id-card-back" id="back-card">
          <!-- Background SVG Layer -->
          <div class="card-bg-layer" id="back-bg-layer"></div>
          
          <div class="card-content">
            <!-- Large Monogram/Logo (styled inside JavaScript/CSS) -->
            <div class="back-logo-wrapper" id="back-logo-container"></div>
            
            <!-- Centered QR Box -->
            <div class="qr-code-box-wrapper-id">
              <div id="qrcode-id" class="qr-code-element-id"></div>
            </div>
            
            <div class="back-footer-decorations" id="back-footer-decor"></div>
          </div>
        </article>

      </div>

      <!-- Action Panel -->
      <div id="action-panel" class="action-panel" style="display: none;">
        <div class="qr-actions">
          <button id="download-front-btn" class="btn btn-primary">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 6px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
            Download Front
          </button>
          <button id="download-back-btn" class="btn btn-primary">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 6px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
            Download Back
          </button>
          <button id="print-btn" class="btn btn-secondary" style="grid-column: span 2;">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 6px;"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>
            Print Both Sides
          </button>
        </div>

        <a href="./admin.html" class="back-link" style="margin-top: 1.5rem; justify-content: center; width: 100%;">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 4px; vertical-align: middle;"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
          Back to Admin Dashboard
        </a>
      </div>

    </main>

  </div>

  <script type="module" src="./assets/js/qr.js"></script>
</body>
</html>
