<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student ID QR Code - Don Bosco College</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/css/style.css">
  <link rel="stylesheet" href="./assets/css/qr.css">
  <!-- QR Code Styling Library -->
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>
</head>
<body class="qr-page-theme">

  <div class="qr-container">
    
    <!-- Dynamic Content Area -->
    <main class="qr-wrapper">
      
      <!-- 1. LOADING STATE -->
      <div id="loading-view" class="qr-placeholder-state">
        <div class="loader-dots">
          <span></span>
          <span></span>
          <span></span>
        </div>
        <p class="loading-text">Generating student QR code...</p>
      </div>

      <!-- 2. ERROR STATE -->
      <div id="error-view" class="qr-error-card" style="display: none;">
        <div style="font-size: 3rem; color: var(--accent-primary);">⚠️</div>
        <h1>Profile Not Found</h1>
        <p>The student ID requested does not exist or has been removed.</p>
        <a href="./admin.html" class="btn btn-secondary" style="width: 100%; margin-top: 1rem;">Return to Admin Panel</a>
      </div>

      <!-- 3. QR CARD DISPLAY -->
      <article id="qr-view" class="qr-card" style="display: none;">
        <div class="qr-card-header">
          <img src="./assets/images/logo.png" alt="Don Bosco College" class="qr-college-logo" onerror="this.style.display='none';">
          <div class="college-title">
            <h2>DON BOSCO COLLEGE</h2>
            <p>MAMPETTA, MUKKAM</p>
          </div>
        </div>

        <div class="qr-student-profile">
          <div class="qr-photo-container">
            <img id="student-photo" src="" alt="Student Photo" style="display: none;">
            <div id="student-avatar-placeholder" class="avatar-placeholder">S</div>
          </div>
          <h1 id="student-name">Student Name</h1>
          <p id="student-dept">Department Name</p>
        </div>

        <!-- The Styled QR Box -->
        <div class="qr-code-box-wrapper">
          <div id="qrcode" class="qr-code-element"></div>
        </div>
        <p class="scan-instructions">Scan to view digital profile</p>

        <!-- Actions -->
        <div class="qr-actions">
          <button id="download-btn" class="btn btn-primary">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 6px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
            Download QR
          </button>
          <button id="print-btn" class="btn btn-secondary">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 6px;"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>
            Print ID Card
          </button>
        </div>

        <a href="./admin.html" class="back-link">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 4px; vertical-align: middle;"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
          Back to Admin Dashboard
        </a>
      </article>

    </main>

  </div>

  <script type="module" src="./assets/js/qr.js"></script>
</body>
</html>
