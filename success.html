<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Submission Successful</title>
  <link rel="stylesheet" href="./assets/css/style.css">
  <style>
    .success-container {
      min-height: calc(100vh - 120px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 0;
    }
    .success-card {
      max-width: 480px;
      width: 100%;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      padding: 3rem 2rem;
      border-top: 6px solid var(--accent-secondary);
      animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    .success-icon-wrapper {
      width: 80px;
      height: 80px;
      background: rgba(6, 182, 212, 0.1);
      border: 2px solid var(--accent-secondary);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 20px var(--accent-secondary-glow);
      color: var(--accent-secondary);
      animation: bounceIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .success-icon-wrapper svg {
      width: 40px;
      height: 40px;
    }
    .success-title {
      font-size: 1.75rem;
      font-weight: 800;
      color: white;
    }
    .success-desc {
      color: var(--text-secondary);
      font-size: 1rem;
      line-height: 1.6;
    }
    .admin-note-box {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: var(--radius-sm);
      padding: 1rem;
      font-size: 0.85rem;
      color: var(--text-muted);
      border-left: 3px solid var(--accent-primary);
      text-align: left;
      width: 100%;
      margin: 0.5rem 0;
    }
    .admin-note-box strong {
      color: var(--text-secondary);
      display: block;
      margin-bottom: 0.25rem;
    }
    @keyframes bounceIn {
      0% { transform: scale(0.3); opacity: 0; }
      50% { transform: scale(1.1); }
      70% { transform: scale(0.9); }
      100% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>

  <div class="bg-gradients"></div>
  <div class="bg-gradients-extra"></div>

  <div class="container">
    <header>
      <a href="./index.html" class="logo">
        <div class="logo-icon">S</div>
        <div class="logo-text">STUDENT<span>ID</span></div>
      </a>
    </header>

    <main class="success-container">
      <div class="glass-card success-card">
        
        <div class="success-icon-wrapper">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
          </svg>
        </div>

        <h1 class="success-title">Submission Successful</h1>
        
        <p class="success-desc">
          Your profile details have been uploaded successfully.
        </p>

        <div class="admin-note-box">
          <strong>Verification Notice:</strong>
          The administrator will verify your information and provide your profile link after verification.
        </div>

        <a href="./index.html" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
          Return to Home
        </a>

      </div>
    </main>
  </div>

  <footer>
    <p>&copy; 2026 Don Bosco College Mampetta. All rights reserved.</p>
  </footer>

</body>
</html>
